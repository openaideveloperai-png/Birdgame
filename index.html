<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070608" />
    <title>Blacksite — WebGL Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="Dark baseplate exploration prototype"></canvas>
      <section class="hud">
        <p class="brand">BLACKSITE / 01</p>
        <p class="status"><span></span> EMERGENCY POWER</p>
      </section>
      <section id="panel" class="panel">
        <p class="eyebrow">CONTAINMENT LEVEL B</p>
        <h1>Stay in the light.</h1>
        <p>A bare baseplate. A lone figure. Something is moving in the dark.</p>
        <button id="start" type="button">Enter</button>
      </section>
      <p class="hint">W A S D / ARROWS TO MOVE · MOUSE TO LOOK</p>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
