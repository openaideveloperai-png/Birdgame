<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#061b33" />
    <title>Skywing — WebGL Bird Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="Skywing game"></canvas>
      <section class="hud" aria-live="polite">
        <p class="brand">SKYWING</p>
        <p class="score-label">SCORE <span id="score">0</span></p>
      </section>
      <section id="panel" class="panel">
        <p class="eyebrow">WEBGL FLIGHT RUNNER</p>
        <h1 id="title">Take flight</h1>
        <p id="message">Press <kbd>Space</kbd>, <kbd>↑</kbd>, or tap to flap through the canyon.</p>
        <button id="start" type="button">Fly</button>
      </section>
      <p class="hint">SPACE / ↑ / TAP TO FLAP</p>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
